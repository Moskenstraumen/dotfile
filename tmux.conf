# ╭──────────────────────────────────────────────────────────╮
# │                         Plugins                          │
# ╰──────────────────────────────────────────────────────────╯

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'jimeh/tmuxifier'

run '~/.tmux/plugins/tpm/tpm'

# ╭──────────────────────────────────────────────────────────╮
# │                          Theme                           │
# ╰──────────────────────────────────────────────────────────╯

set -g status-position top
set -g status-justify absolute-centre

set -g status-bg '#1e1e2e'
set -g status-fg '#cdd6f4'

set -g status-left '#[fg=#cba6f7] #S#[fg=black] ⟩ #(echo "#{pane_current_path}" \
  | sed "s|^$HOME|~|" \
  | awk -F/ '\''{
      n = NF
      if (n > 3)
        path = $(n-2)"/"$(n-1)"/"$n
      else
        path = $0

      max = 15

      if (length(path) > max)
        print ".." substr(path, length(path)-max+4)
      else
        print path
  }'\'') '
set -g status-left-length 50

set -g status-right "#h"

set -g copy-mode-match-style 'fg=#1e1e2e,bg=#cdd6f4'
set -g copy-mode-current-match-style 'fg=#1e1e2e,bg=#d20f39'

set -g pane-border-style 'fg=#45475a'
set -g pane-active-border-style 'fg=#f9e2af'

set -g window-status-style 'fg=#585b70'
set -g window-status-current-style 'fg=#cba6f7,bold'

set -g window-status-format "#{window_index} #W#{?window_zoomed_flag, ,  }"
set -g window-status-current-format "#{window_index} #W#{?window_zoomed_flag, ,  }"

# ╭──────────────────────────────────────────────────────────╮
# │                         Options                          │
# ╰──────────────────────────────────────────────────────────╯

# Set true color and cursor style passthrough
set-option -g  default-terminal "tmux-256color"
set-option -as terminal-overrides ",xterm*:Tc"
set-option -as terminal-overrides ",*:Ss=\\E[%p1%d q:Se=\\E[2 q"
set-option -as terminal-features ",xterm-kitty:RGB"
set -s  extended-keys on
set -as terminal-features ",xterm-kitty:extkeys"

set -g set-clipboard on
set -g cursor-style block
set -g mouse on
set -g base-index 1
set -g pane-base-index 1
set-option -g renumber-windows on
set-window-option -g mode-keys vi
set-option -g allow-rename on
set -sg escape-time 5
set -sg repeat-time 0

# Update terminal (kitty) title with tmux session name
set-option -g set-titles on
set-option -g set-titles-string "#S"

# yazi/zsh support
set -g allow-passthrough on
set -ga update-environment TERM_PROGRAM

# ╭──────────────────────────────────────────────────────────╮
# │                       Keybindings                        │
# ╰──────────────────────────────────────────────────────────╯

# Use default Ctrl+b prefix (no change needed)
# If you want to see options:
# bind o show-options -g

# Visual mode (vim-style)
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi C-v send-keys -X rectangle-toggle
bind -T copy-mode-vi y send-keys -X copy-selection-and-cancel
bind -T copy-mode-vi Y send -X copy-end-of-line

# Open panes in current directory
bind '"' split-window -v -c "#{pane_current_path}"
bind % split-window -h -c "#{pane_current_path}"

# Open new window in home directory
bind c new-window -c ~

# Clear scrollback buffer
bind K send-keys "clear"\; send-keys "Enter"\; clear-history

bind a setw synchronize-panes \; display "Sync #{?pane_synchronized,ON,OFF}"

# Reload tmux.conf
bind r source-file ~/.tmux.conf \; display-message "~/.tmux.conf reloaded."
bind s choose-tree -swZ
bind w choose-tree -wZ

# ╭──────────────────────────────────────────────────────────╮
# │         Seamless Nvim + Tmux Navigation (ijkl)          │
# ╰──────────────────────────────────────────────────────────╯

# vim-tmux-navigator integration
# Smart navigation that detects whether you're in nvim or tmux
is_vim="ps -o state= -o comm= -t '#{pane_tty}' | grep -iqE '^[^TXZ ]+ +(\\S+\\/)?g?(view|l?n?vim?x?|fzf)(diff)?$'"

# Prefix-less navigation (C-ijkl)
bind-key -n 'C-j' if-shell "$is_vim" 'send-keys C-j' 'select-pane -L'
bind-key -n 'C-k' if-shell "$is_vim" 'send-keys C-k' 'select-pane -D'
bind-key -n 'C-i' if-shell "$is_vim" 'send-keys C-i' 'select-pane -U'
bind-key -n 'C-l' if-shell "$is_vim" 'send-keys C-l' 'select-pane -R'

bind-key -T copy-mode-vi 'C-j' select-pane -L
bind-key -T copy-mode-vi 'C-k' select-pane -D
bind-key -T copy-mode-vi 'C-i' select-pane -U
bind-key -T copy-mode-vi 'C-l' select-pane -R

# Prefix-based navigation (prefix + ijkl)
bind-key j select-pane -L
bind-key k select-pane -D
bind-key i select-pane -U
bind-key l select-pane -R

# Smart pane splitting (auto-detects orientation) - moved to '-'
bind - run-shell " \
if [ $(( \$(tmux display -p '8*#{pane_width}-20*#{pane_height}') )) -lt 0 ]; then \
  tmux splitw -v -c '#{pane_current_path}'; \
else \
  tmux splitw -h -c '#{pane_current_path}'; \
fi"

bind -n M-O next-layout

# Resize panes with Shift+arrows
bind -n S-Up    resize-pane -U 5
bind -n S-Down  resize-pane -D 5
bind -n S-Left  resize-pane -L 5
bind -n S-Right resize-pane -R 5

# Move window
bind -n M-S-Left swap-window -t -1\; select-window -t -1
bind -n M-S-Right swap-window -t +1\; select-window -t +1
